<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lukis</title>
  <meta name="description" content="Offline data logging with cloud sync. Export to CSV.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">

  <!-- Home-screen app (iOS reads the apple-* variants) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lukis">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">

  <style>
    * { box-sizing: border-box; }
    /* An author display rule (e.g. .tabs) otherwise wins over the UA [hidden]
       rule, so the hidden attribute silently stops working. Make it stick. */
    [hidden] { display: none !important; }
    :root {
      --bg:#f1f5f9; --surface:#fff; --text:#0f172a; --muted:#64748b;
      --primary:#2563eb; --primary-press:#1d4ed8; --danger:#dc2626;
      --border:#e2e8f0; --radius:14px;
      --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
    }
    html, body { margin:0; padding:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--text); line-height:1.4;
      -webkit-font-smoothing:antialiased;
    }
    .app-header {
      position:sticky; top:0; z-index:10;
      background:var(--primary); color:#fff;
      padding:calc(10px + var(--safe-top)) 16px 10px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      box-shadow:0 1px 4px rgba(0,0,0,.12);
    }
    .app-header h1 { font-size:20px; margin:0; font-weight:700; letter-spacing:.2px; }
    .tabs { display:flex; gap:4px; background:rgba(255,255,255,.18); padding:3px; border-radius:999px; }
    .tab {
      border:none; background:transparent; color:#fff; font-weight:600; font-size:14px;
      padding:6px 16px; border-radius:999px; cursor:pointer; font-family:inherit;
    }
    .tab.is-active { background:#fff; color:var(--primary); }
    .container { max-width:560px; margin:0 auto; padding:16px 16px calc(24px + var(--safe-bottom)); }
    .view[hidden] { display:none; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
    .card-title { font-size:18px; margin:0 0 6px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:14px; font-weight:600; margin-bottom:6px; }
    .field .req { color:var(--danger); margin-left:2px; }
    input, select, textarea {
      width:100%; font-size:16px; /* 16px keeps iOS from auto-zooming on focus */
      padding:12px; border:1px solid var(--border); border-radius:10px;
      background:#fff; color:var(--text); font-family:inherit;
    }
    textarea { min-height:84px; resize:vertical; }
    input:focus, select:focus, textarea:focus {
      outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.15);
    }
    .field.checkbox { display:flex; align-items:center; gap:10px; }
    .field.checkbox input { width:20px; height:20px; }
    .field.checkbox label { margin:0; }
    .form-actions { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .btn { font-size:16px; font-weight:600; border:none; border-radius:10px; padding:13px 16px; cursor:pointer; font-family:inherit; }
    .btn-primary { width:100%; background:var(--primary); color:#fff; min-height:50px; }
    .btn-primary:active { background:var(--primary-press); }
    .btn-primary:disabled { opacity:.6; cursor:default; }
    .btn-secondary { background:#eef2ff; color:var(--primary); }
    .btn-ghost { background:transparent; color:var(--muted); }
    .btn-ghost-danger { background:transparent; color:var(--danger); }
    .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
    .cat-btn {
      border:none; border-radius:12px; background:var(--primary); color:#fff;
      font-size:18px; font-weight:700; font-family:inherit; padding:24px 12px; cursor:pointer;
      min-height:88px; box-shadow:0 1px 2px rgba(0,0,0,.08);
    }
    .cat-btn:active { background:var(--primary-press); transform:translateY(1px); }
    .list-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .recent-actions { display:flex; gap:8px; }
    .recent-list { list-style:none; margin:0; padding:0; }
    .date-group { list-style:none; }
    .date-header {
      display:flex; align-items:center; gap:8px; width:100%;
      background:none; border:none; cursor:pointer; font-family:inherit; text-align:left;
      font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;
      padding:16px 0 6px;
    }
    .date-group:first-child .date-header { padding-top:2px; }
    .date-caret { font-size:9px; transition:transform .15s; }
    .date-header[aria-expanded="false"] .date-caret { transform:rotate(-90deg); }
    .date-count { margin-left:auto; font-variant-numeric:tabular-nums; }
    .date-rows { list-style:none; margin:0; padding:0; }
    .entry-row { display:flex; align-items:center; gap:10px; padding:8px 0; }
    .entry-row + .entry-row { border-top:1px solid var(--border); }
    .entry-row .time { color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; flex:none; }
    .entry-row .cat { color:var(--muted); font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .entry-actions { display:flex; align-items:center; gap:2px; flex:none; }
    .entry-edit { background:none; border:none; color:var(--muted); font-size:18px; line-height:1; cursor:pointer; padding:4px 8px; }
    .entry-edit:active { color:var(--primary); }
    .entry-del { background:none; border:none; color:var(--muted); font-size:22px; line-height:1; cursor:pointer; padding:2px 6px; }
    .entry-del:active { color:var(--danger); }
    .account { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
    .account .btn-ghost { width:auto; padding:8px 10px; }
    .muted { color:var(--muted); font-size:14px; }
    .toast {
      position:fixed; left:50%; bottom:calc(20px + var(--safe-bottom));
      transform:translateX(-50%) translateY(20px);
      background:#0f172a; color:#fff; padding:11px 18px; border-radius:999px; font-size:14px;
      opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:50; max-width:90%;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Lukis</h1>
    <nav class="tabs" id="tabs" role="tablist" hidden>
      <button class="tab is-active" type="button" data-view="log" role="tab">Log</button>
      <button class="tab" type="button" data-view="all" role="tab">All</button>
    </nav>
  </header>

  <main class="container">
    <!-- Shown until Firebase reports whether someone is signed in -->
    <section id="view-loading" class="view">
      <div class="card"><p class="muted">Loading…</p></div>
    </section>

    <!-- Sign-in: Google -->
    <section id="view-auth" class="view" hidden>
      <div class="card">
        <h2 class="card-title">Sign in</h2>
        <p class="muted">Sign in with your Google account to sync your bookings across devices.</p>
        <button type="button" id="google-signin-btn" class="btn btn-primary">Sign in with Google</button>
        <p id="signin-status" class="muted" aria-live="polite"></p>
      </div>
    </section>

    <!-- Log view: tap a category to book it; edit an existing booking in place -->
    <section id="view-log" class="view" hidden>
      <!-- Quick booking: optional remark, then one tap on a category -->
      <div class="card" id="quickbook">
        <div class="field">
          <label for="remark">Remark</label>
          <input id="remark" type="text" autocomplete="off" placeholder="Optional, applied to the next booking">
        </div>
        <!-- Category buttons are rendered from CATEGORIES in app.js -->
        <div class="cat-grid" id="cat-grid"></div>
      </div>

      <!-- Edit an existing booking -->
      <div class="card" id="editcard" hidden>
        <h2 class="card-title">Edit booking</h2>
        <form id="edit-form">
          <div class="field">
            <label for="edit-category">Category</label>
            <select id="edit-category"></select>
          </div>
          <div class="field">
            <label for="edit-remark">Remark</label>
            <input id="edit-remark" type="text" autocomplete="off">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update</button>
            <button type="button" id="edit-cancel" class="btn btn-ghost">Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <!-- All view: full list with per-entry edit and delete, export, and account -->
    <section id="view-all" class="view" hidden>
      <div class="card">
        <div class="list-head">
          <span id="count" class="muted"></span>
          <div class="recent-actions">
            <button id="export-btn" type="button" class="btn btn-secondary">Export</button>
            <button id="clear-btn" type="button" class="btn btn-ghost-danger" title="Delete all entries">Clear</button>
          </div>
        </div>
        <ul id="entry-list" class="recent-list"></ul>
        <p id="empty-note" class="muted">No entries yet.</p>
        <div class="account">
          <span id="account-email" class="muted"></span>
          <button id="signout-btn" type="button" class="btn btn-ghost">Sign out</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
